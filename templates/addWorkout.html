<!DOCTYPE html>
<html>
    <head>
        <title>BarPath</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <header>
            <h1>BarPath</h1>
        </header>

        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_workout') }}" aria-current="page">Add Workout</a>
            <a href="{{ url_for('history') }}">History</a>
        </nav>

        <div class="container">
            <h2>Add Workout</h2>

            <form method="POST" action="/add">
                
                <label>Lift:</label>
                <select name="lift">
                    <option>Bench</option>
                    <option>Squat</option>
                    <option>Deadlift</option>
                </select>

                <label>Weight:</label>
                <input type="number" name="weight" required>

                <label>Reps:</label>
                <input type="number" name="reps" required>

                <label>Sets:</label>
                <input type="number" name="sets" required>

                <br><br>

                <button type="submit">Save Workout</button>

            </form>
        </div>

    </body>
</html>
