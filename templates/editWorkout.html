<!DOCTYPE html>
<html>
    <head>
        <title>Edit Workout - BarPath</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <header>
            <h1>BarPath</h1>
        </header>

        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_workout') }}">Add Workout</a>
            <a href="{{ url_for('history') }}">History</a>
        </nav>

        <div class="container">
            <h2>Edit Workout</h2>

            <form method="POST" action="{{ url_for('edit_workout', workout_id=workout_id) }}">
                <label>Workout Name:</label>
                <input type="text" name="workout_name" value="{{ workout_name }}" required>

                <label>Date:</label>
                <input type="date" name="date" value="{{ date }}" required>

                <div id="exercises_container"></div>

                <br>
                <button type="button" onclick="addExercise()">Add Exercise</button>
                <button type="submit">Save Changes</button>
            </form>
        </div>

        <script>
            let exerciseCount = 0;

            function addExercise(exerciseName = "", sets = []) {
                exerciseCount++;

                const exercisesContainer = document.getElementById("exercises_container");

                const exerciseDiv = document.createElement("div");
                exerciseDiv.className = "card exercise-card";
                exerciseDiv.id = `exercise_${exerciseCount}`;

                exerciseDiv.innerHTML = `
                    <h3 class="exercise-title">Exercise ${document.querySelectorAll('.exercise-card').length + 1}</h3>

                    <label>Exercise Name:</label>
                    <input type="text" name="exercise_name_${exerciseCount}" value="${exerciseName}" required>

                    <input type="hidden" id="set_count_${exerciseCount}" value="0">

                    <div id="sets_container_${exerciseCount}"></div>

                    <br>
                    <button type="button" onclick="addSet(${exerciseCount})">Add Set</button>
                    <button type="button" onclick="removeExercise(${exerciseCount})">Remove Exercise</button>
                `;

                exercisesContainer.appendChild(exerciseDiv);

                if (sets.length > 0) {
                    sets.forEach(set => {
                        addSet(exerciseCount, set[0], set[1]);
                    });
                } else {
                    addSet(exerciseCount);
                }

                renumberExercises();
            }

            function addSet(exerciseNumber, weight = "", reps = "") {
                const setCountInput = document.getElementById(`set_count_${exerciseNumber}`);
                let setCount = parseInt(setCountInput.value) + 1;
                setCountInput.value = setCount;

                const setsContainer = document.getElementById(`sets_container_${exerciseNumber}`);

                const setDiv = document.createElement("div");
                setDiv.className = "set-row";
                setDiv.id = `exercise_${exerciseNumber}_set_${setCount}`;

                setDiv.innerHTML = `
                    <h4 class="set-title">Set ${setsContainer.querySelectorAll('.set-row').length + 1}</h4>

                    <label>Weight:</label>
                    <input type="number" name="weight_${exerciseNumber}_${setCount}" value="${weight}" required>

                    <label>Reps:</label>
                    <input type="number" name="reps_${exerciseNumber}_${setCount}" value="${reps}" required>

                    <button type="button" onclick="removeSet(${exerciseNumber}, ${setCount})">Remove Set</button>
                    <hr>
                `;

                setsContainer.appendChild(setDiv);
                renumberSets(exerciseNumber);
            }

            function removeExercise(exerciseNumber) {
                const exerciseDiv = document.getElementById(`exercise_${exerciseNumber}`);
                if (exerciseDiv) {
                    exerciseDiv.remove();
                    renumberExercises();
                }
            }

            function removeSet(exerciseNumber, setNumber) {
                const setDiv = document.getElementById(`exercise_${exerciseNumber}_set_${setNumber}`);
                if (setDiv) {
                    setDiv.remove();
                    renumberSets(exerciseNumber);
                }
            }

            function renumberExercises() {
                const exerciseCards = document.querySelectorAll(".exercise-card");

                exerciseCards.forEach((card, index) => {
                    const title = card.querySelector(".exercise-title");
                    if (title) {
                        title.textContent = `Exercise ${index + 1}`;
                    }
                });
            }

            function renumberSets(exerciseNumber) {
                const setsContainer = document.getElementById(`sets_container_${exerciseNumber}`);
                if (!setsContainer) return;

                const setRows = setsContainer.querySelectorAll(".set-row");

                setRows.forEach((row, index) => {
                    const title = row.querySelector(".set-title");
                    if (title) {
                        title.textContent = `Set ${index + 1}`;
                    }
                });
            }

            window.onload = function () {
                const existingExercises = {{ exercises|tojson }};

                existingExercises.forEach(exercise => {
                    addExercise(exercise.exercise_name, exercise.sets);
                });
            };
        </script>
    </body>
</html>
