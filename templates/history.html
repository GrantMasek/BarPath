<!DOCTYPE html>
<html>
    <head>
        <title>BarPath</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <header>
            <h1>BarPath</h1>
        </header>

        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_workout') }}">Add Workout</a>
            <a href="{{ url_for('history') }}" aria-current="page">History</a>
        </nav>

        <div class="container">
            <h2>Workout History</h2>

            {% for workout in workouts %}
                <div class="card">
                    <p>
                        {{ workout[1] }} - {{ workout[2] }} lbs x {{ workout[3] }} ({{ workout[4] }} sets)
                    </p>
                </div>
            {% endfor %}

        </div>

    </body>
</html>
